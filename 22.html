<!DOCTYPE html>
<html>
<body>

<div id="d1">
  <p>One child</p>
</div>

<div id="d2">
  <p>Child 1</p>
  <p>Child 2</p>
</div>

<div id="d3">
  <span>Child 1</span>
  <span>Child 2</span>
  <span>Child 3</span>
</div>

<script>
let divs = document.querySelectorAll("div");

divs.forEach(function(div) {
    if (div.children.length > 1) {
        div.style.border = "2px solid red";
    }
});
</script>

</body>
</html>
